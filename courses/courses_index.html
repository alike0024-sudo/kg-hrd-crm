<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="author" content="정비솔">
<meta name="robots" content="noindex,nofollow">
<title>KG에듀원 과정리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F5F7;--surface:#fff;--surface2:#F0F2F5;--surface3:#E4E7EC;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#1A1D23;--text2:#4A5168;--text3:#8891A8;
  --accent:#3562E0;--green:#1E9E5E;--amber:#D48A0A;--red:#D63B35;
  --sans:'Noto Sans KR',sans-serif;--r:8px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
/* ── 헤더 ── */
.header{background:var(--accent);color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.header-left{display:flex;align-items:center;gap:14px}
.logo{font-size:16px;font-weight:700;letter-spacing:0.04em}
.logo span{opacity:0.7;font-weight:400}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* ── 탭 ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto}
.tab-btn{padding:12px 18px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all 0.15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.tab-btn:hover:not(.active){color:var(--text2)}
/* ── 툴바 ── */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:400px}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:12px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.filter-select{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface2);color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;outline:none}
.count-badge{font-size:11px;color:var(--text3);white-space:nowrap}
/* ── 테이블 ── */
.table-wrap{overflow:auto;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--surface2);color:var(--text2);font-weight:600;padding:9px 10px;border-bottom:2px solid var(--border2);white-space:nowrap;position:sticky;top:0;z-index:10;cursor:pointer;user-select:none}
thead th:hover{background:var(--surface3)}
thead th.sort-asc::after{content:' ▲';font-size:9px;color:var(--accent)}
thead th.sort-desc::after{content:' ▼';font-size:9px;color:var(--accent)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s}
tbody tr:hover{background:#EEF2FF}
tbody td{padding:8px 10px;color:var(--text);vertical-align:middle}
tbody td.num{font-family:monospace;text-align:right;color:var(--text2)}
tbody td.center{text-align:center}
/* ── 배지 ── */
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.badge-blue{background:#EEF2FF;color:#3562E0}
.badge-green{background:#ECFDF5;color:#1E9E5E}
.badge-amber{background:#FFFBEB;color:#D48A0A}
.badge-gray{background:#F1F5F9;color:#64748B}
.badge-red{background:#FEF2F2;color:#D63B35}
.badge-new{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
/* ── 로딩/빈 ── */
.loading{text-align:center;padding:60px 20px;color:var(--text3)}
.loading .spin{display:inline-block;width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
/* ── 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border-radius:14px;width:600px;max-width:95vw;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1}
.modal-body{overflow-y:auto;padding:20px;flex:1}
.modal-row{display:flex;gap:4px;padding:8px 0;border-bottom:1px solid var(--border)}
.modal-label{width:120px;min-width:120px;font-size:11px;color:var(--text3);font-weight:600;padding-top:2px}
.modal-value{flex:1;font-size:13px;color:var(--text)}
/* ── 버튼 ── */
.btn{padding:6px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px;font-family:var(--sans);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--surface3)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:0.88}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
/* ── 토스트 ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D23;color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
/* ── 반응형 ── */
@media(max-width:768px){
  .header{padding:0 12px}
  .toolbar{padding:8px 12px}
  .table-wrap{font-size:11px}
  tbody td{padding:6px 8px}
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <div class="logo">KG에듀원<span>.</span>HRD <span>과정리스트</span></div>
    <span id="headerDate" style="font-size:11px;opacity:0.7"></span>
  </div>
  <div class="header-right">
    <button class="btn btn-primary" onclick="syncFromSheet()" id="syncBtn">🔄 시트 동기화</button>
    <a id="sheetLink" href="#" target="_blank" class="btn" style="text-decoration:none">📊 원본 시트</a>
  </div>
</div>

<!-- 탭 -->
<div class="tabs" id="tabBar"></div>

<!-- 툴바 -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" id="searchInput" placeholder="과정명, 과정키, CP명으로 검색..." oninput="applyFilter()">
  </div>
  <select class="filter-select" id="catFilter" onchange="applyFilter()">
    <option value="">전체 대분류</option>
  </select>
  <select class="filter-select" id="typeFilter" onchange="applyFilter()">
    <option value="">전체 과정유형</option>
  </select>
  <select class="filter-select" id="mobileFilter" onchange="applyFilter()">
    <option value="">모바일 전체</option>
    <option value="Y">모바일 가능</option>
    <option value="N">모바일 불가</option>
  </select>
  <span class="count-badge" id="countBadge">0개</span>
</div>

<!-- 테이블 -->
<div class="table-wrap" id="tableWrap">
  <div class="loading"><div class="spin"></div><br>데이터 불러오는 중...</div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">과정 상세</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 설정 ──
const SHEET_ID = '1_c86pZM6F4fkFz9T1O31brau3Jlsf3_d';
const TABS = [
  { name:'직무(공통)', gid:'1825892502' },
  { name:'법정필수',   gid:'316906315'  },
  { name:'외국어',     gid:'78329365'   },
  { name:'전화외국어', gid:'653358122'  },
];

// 고정 컬럼 인덱스 매핑 (0-based)
// 시트: No(0), 대분류(1), 중분류(2), 소분류(3), 대상(4), 과정유형(5),
//       포팅방식(6), 콘텐츠형태(7), 과정명(8), 변경전과정키(9), 과정키(10),
//       미리보기(11), 모바일여부(12), 교육비(13),
//       대기업환급(14), 대기업실비(15), 중견환급(16), 중견실비(17),
//       우선환급(18), 우선실비(19), 환급여부(20), 학습기간(21), 학습시간(22)
const COL = {
  no:0, cat1:1, cat2:2, cat3:3, target:4, type:5,
  porting:6, content:7, name:8, oldKey:9, key:10,
  preview:11, mobile:12, fee:13,
  bigRefund:14, bigReal:15, midRefund:16, midReal:17,
  priRefund:18, priReal:19, refundYn:20, period:21, hours:22
};

// 데이터 시작 행 (0-indexed) — 헤더가 여러 줄이므로 실제 데이터 첫 줄
const DATA_START = 15;

// ── 상태 ──
let allData   = {};   // { tabName: [rows...] }
let curTab    = TABS[0].name;
let sortCol   = null;
let sortAsc   = true;
let filtered  = [];

// ── 초기화 ──
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
  document.getElementById('sheetLink').href = `https://docs.google.com/spreadsheets/d/${SHEET_ID}`;
  buildTabs();
  loadAllTabs();
});

function buildTabs(){
  const bar = document.getElementById('tabBar');
  bar.innerHTML = TABS.map(t=>`
    <button class="tab-btn ${t.name===curTab?'active':''}" onclick="switchTab('${t.name}')">${t.name}</button>
  `).join('');
}

async function loadAllTabs(){
  showLoading();
  for(const t of TABS){
    try{
      const rows = await fetchTab(t.gid);
      allData[t.name] = rows;
    } catch(e){
      allData[t.name] = [];
      console.warn(t.name, e.message);
    }
  }
  renderTab();
}

async function fetchTab(gid){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text){
  const lines = text.split('\n');
  const rows = [];
  for(let i = DATA_START; i < lines.length; i++){
    const line = lines[i].trim();
    if(!line) continue;
    const cols = csvLine(line);
    const name = (cols[COL.name]||'').trim();
    const key  = (cols[COL.key]||'').trim();
    if(!name && !key) continue;
    rows.push({
      no:       (cols[COL.no]||'').trim(),
      cat1:     (cols[COL.cat1]||'').trim(),
      cat2:     (cols[COL.cat2]||'').trim(),
      cat3:     (cols[COL.cat3]||'').trim(),
      target:   (cols[COL.target]||'').trim(),
      type:     (cols[COL.type]||'').trim(),
      porting:  (cols[COL.porting]||'').trim(),
      content:  (cols[COL.content]||'').trim(),
      name,
      oldKey:   (cols[COL.oldKey]||'').trim(),
      key,
      preview:  (cols[COL.preview]||'').trim(),
      mobile:   (cols[COL.mobile]||'').trim(),
      fee:      (cols[COL.fee]||'').trim(),
      bigRefund:(cols[COL.bigRefund]||'').trim(),
      bigReal:  (cols[COL.bigReal]||'').trim(),
      midRefund:(cols[COL.midRefund]||'').trim(),
      midReal:  (cols[COL.midReal]||'').trim(),
      priRefund:(cols[COL.priRefund]||'').trim(),
      priReal:  (cols[COL.priReal]||'').trim(),
      refundYn: (cols[COL.refundYn]||'').trim(),
      period:   (cols[COL.period]||'').trim(),
      hours:    (cols[COL.hours]||'').trim(),
    });
  }
  return rows;
}

function csvLine(line){
  const result = [];
  let cur = '', inQ = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===','&&!inQ){ result.push(cur); cur=''; }
    else { cur+=c; }
  }
  result.push(cur);
  return result;
}

async function syncFromSheet(){
  const btn = document.getElementById('syncBtn');
  btn.textContent = '🔄 동기화 중...';
  btn.disabled = true;
  showLoading();
  await loadAllTabs();
  btn.textContent = '🔄 시트 동기화';
  btn.disabled = false;
  showToast('✅ 시트 동기화 완료!');
}

function switchTab(name){
  curTab = name;
  sortCol = null;
  sortAsc = true;
  document.getElementById('searchInput').value = '';
  buildTabs();
  renderTab();
}

function renderTab(){
  const rows = allData[curTab] || [];
  
  // 필터 옵션 빌드
  buildFilters(rows);
  applyFilter();
}

function buildFilters(rows){
  const cats  = [...new Set(rows.map(r=>r.cat1).filter(Boolean))].sort();
  const types = [...new Set(rows.map(r=>r.type).filter(Boolean))].sort();
  const catSel  = document.getElementById('catFilter');
  const typeSel = document.getElementById('typeFilter');
  catSel.innerHTML  = '<option value="">전체 대분류</option>'  + cats.map(c=>`<option>${c}</option>`).join('');
  typeSel.innerHTML = '<option value="">전체 과정유형</option>' + types.map(t=>`<option>${t}</option>`).join('');
}

function applyFilter(){
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const cat  = document.getElementById('catFilter').value;
  const type = document.getElementById('typeFilter').value;
  const mob  = document.getElementById('mobileFilter').value;

  let rows = (allData[curTab]||[]).filter(r=>{
    if(cat  && r.cat1   !== cat)  return false;
    if(type && r.type   !== type) return false;
    if(mob  && r.mobile !== mob)  return false;
    if(q){
      const hay = r.name + r.key + r.cat2 + r.cat1;
      if(!hay.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  if(sortCol){
    rows = [...rows].sort((a,b)=>{
      const av = a[sortCol]||'', bv = b[sortCol]||'';
      const an = parseFloat(av.replace(/,/g,'')), bn = parseFloat(bv.replace(/,/g,''));
      const cmp = isNaN(an)||isNaN(bn) ? av.localeCompare(bv,'ko') : an-bn;
      return sortAsc ? cmp : -cmp;
    });
  }

  filtered = rows;
  document.getElementById('countBadge').textContent = `결과 ${rows.length.toLocaleString()}개`;
  renderTable(rows);
}

function renderTable(rows){
  const wrap = document.getElementById('tableWrap');
  if(!rows.length){
    wrap.innerHTML = '<div class="empty">📭 검색 결과가 없습니다</div>';
    return;
  }

  const cols = [
    {key:'no',       label:'No',    w:40},
    {key:'name',     label:'과정명', w:320},
    {key:'key',      label:'과정키', w:70},
    {key:'cat1',     label:'대분류', w:80},
    {key:'cat2',     label:'중분류', w:80},
    {key:'type',     label:'유형',   w:70},
    {key:'mobile',   label:'모바일', w:55},
    {key:'fee',      label:'교육비', w:80},
    {key:'priRefund',label:'우선환급',w:75},
    {key:'midRefund',label:'중견환급',w:75},
    {key:'bigRefund',label:'대기업환급',w:75},
    {key:'period',   label:'기간',   w:55},
    {key:'hours',    label:'시간',   w:45},
  ];

  const thead = `<thead><tr>${cols.map(c=>`
    <th style="width:${c.w}px;min-width:${c.w}px" onclick="sortBy('${c.key}')" class="${sortCol===c.key?(sortAsc?'sort-asc':'sort-desc'):''}">
      ${c.label}
    </th>`).join('')}</tr></thead>`;

  const tbody = '<tbody>' + rows.map((r,i)=>{
    const isNew = !r.oldKey;
    const mob = r.mobile||'';
    return `<tr onclick="showDetail(${i})">
      <td class="center" style="color:var(--text3)">${r.no||i+1}</td>
      <td>
        ${isNew?'<span class="badge badge-new" style="margin-right:4px">NEW</span>':''}
        ${r.name}
      </td>
      <td class="center" style="font-family:monospace;font-size:11px;color:var(--text3)">${r.key}</td>
      <td><span class="badge badge-blue">${r.cat1}</span></td>
      <td style="color:var(--text2)">${r.cat2}</td>
      <td><span class="badge badge-gray">${r.type}</span></td>
      <td class="center"><span class="badge ${mob==='Y'?'badge-green':'badge-gray'}">${mob||'-'}</span></td>
      <td class="num">${fmtNum(r.fee)}</td>
      <td class="num">${fmtNum(r.priRefund)}</td>
      <td class="num">${fmtNum(r.midRefund)}</td>
      <td class="num">${fmtNum(r.bigRefund)}</td>
      <td class="center">${r.period}</td>
      <td class="center">${r.hours}</td>
    </tr>`;
  }).join('') + '</tbody>';

  wrap.innerHTML = `<table>${thead}${tbody}</table>`;
}

function sortBy(col){
  if(sortCol===col) sortAsc=!sortAsc;
  else{ sortCol=col; sortAsc=true; }
  applyFilter();
}

function showDetail(idx){
  const r = filtered[idx];
  if(!r) return;

  const fields = [
    ['과정명',      r.name],
    ['과정키',      r.key],
    ['변경전 과정키', r.oldKey],
    ['대분류',      r.cat1],
    ['중분류',      r.cat2],
    ['소분류',      r.cat3],
    ['대상',        r.target],
    ['과정유형',    r.type],
    ['포팅방식',    r.porting],
    ['콘텐츠형태',  r.content],
    ['모바일여부',  r.mobile],
    ['교육비',      fmtNum(r.fee)+'원'],
    ['우선지원 환급액', fmtNum(r.priRefund)+'원'],
    ['우선지원 실비용', fmtNum(r.priReal)+'원'],
    ['중견기업 환급액', fmtNum(r.midRefund)+'원'],
    ['중견기업 실비용', fmtNum(r.midReal)+'원'],
    ['대기업 환급액',   fmtNum(r.bigRefund)+'원'],
    ['대기업 실비용',   fmtNum(r.bigReal)+'원'],
    ['환급여부',    r.refundYn],
    ['학습기간',    r.period],
    ['학습시간',    r.hours],
    ['미리보기',    r.preview ? `<a href="${r.preview}" target="_blank" style="color:var(--accent)">미리보기 열기 →</a>` : '-'],
  ];

  document.getElementById('modalTitle').textContent = r.name||'과정 상세';
  document.getElementById('modalBody').innerHTML = fields
    .filter(([,v])=>v&&v!=='-'&&v!=='원'&&v!=='0원')
    .map(([l,v])=>`<div class="modal-row"><div class="modal-label">${l}</div><div class="modal-value">${v}</div></div>`)
    .join('');
  document.getElementById('detailModal').classList.add('open');
}

function closeModal(){
  document.getElementById('detailModal').classList.remove('open');
}

document.getElementById('detailModal').addEventListener('click', e=>{
  if(e.target===e.currentTarget) closeModal();
});

function fmtNum(v){
  if(!v||v==='-'||v==='0') return '-';
  const n = parseFloat(String(v).replace(/,/g,''));
  if(isNaN(n)||n===0) return '-';
  return n.toLocaleString('ko-KR');
}

function showLoading(){
  document.getElementById('tableWrap').innerHTML = '<div class="loading"><div class="spin"></div><br>데이터 불러오는 중...</div>';
}

function showToast(msg, duration=2500){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), duration);
}
</script>
